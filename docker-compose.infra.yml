version: "3.8"

services:
  postgres:
    # Upgrade vers PostgreSQL 17 avec TimescaleDB + PGVector (Le standard IA 2026)
    image: timescale/timescaledb-ha:pg16-latest # Image Haute Dispo incluant pgvector par défaut
    container_name: poker_postgres
    environment:
      POSTGRES_USER: poker_bot
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: poker_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    command: postgres -c shared_buffers=1GB -c work_mem=128MB # Optimisation RAM pour le Clustering IA

  redis:
    # Upgrade vers Valkey 8 (Le successeur ultra-rapide et Open Source de Redis)
    image: valkey/valkey:8-alpine
    container_name: poker_valkey
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
